<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerBoost AI - AI Resume Builder & Career Tools</title>
  <meta name="description" content="AI-powered career tools - Build resumes, cover letters, optimize LinkedIn, and ace interviews">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeIn 0.5s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide icons as SVG components
    const FileText = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    );

    const MessageSquare = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    );

    const Linkedin = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    );

    const Camera = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    );

    const Sparkles = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        <path d="M5 3v4"/>
        <path d="M19 17v4"/>
        <path d="M3 5h4"/>
        <path d="M17 19h4"/>
      </svg>
    );

    const Crown = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>
      </svg>
    );

    const Check = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );

    const ChevronRight = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    );

    const X = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );

    // Tool configurations
    const TOOLS = [
      {
        id: 'resume',
        name: 'AI Resume Builder',
        icon: FileText,
        description: 'Create ATS-optimized resumes in minutes',
        color: 'from-amber-500 to-orange-600'
      },
      {
        id: 'cover-letter',
        name: 'Cover Letter Generator',
        icon: MessageSquare,
        description: 'Personalized cover letters that get interviews',
        color: 'from-blue-500 to-indigo-600'
      },
      {
        id: 'linkedin',
        name: 'LinkedIn Optimizer',
        icon: Linkedin,
        description: 'Optimize your profile for recruiters',
        color: 'from-violet-500 to-purple-600'
      },
      {
        id: 'interview',
        name: 'Interview Prep AI',
        icon: Camera,
        description: 'Practice with AI-generated questions',
        color: 'from-emerald-500 to-teal-600'
      }
    ];

    // Main App Component
    function CareerBoostAI() {
      const [currentPage, setCurrentPage] = useState('home');
      const [usageCount, setUsageCount] = useState(0);
      const [showUpgrade, setShowUpgrade] = useState(false);
      const FREE_LIMIT = 3;

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100">
          {/* Navigation */}
          <nav className="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div 
                  className="flex items-center gap-3 cursor-pointer group"
                  onClick={() => setCurrentPage('home')}
                >
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg">
                    <Sparkles />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-amber-400 via-orange-300 to-amber-500 bg-clip-text text-transparent">
                      CareerBoost AI
                    </h1>
                    <p className="text-xs text-slate-500 -mt-1">Professional Tools Suite</p>
                  </div>
                </div>

                <button
                  onClick={() => setShowUpgrade(true)}
                  className="px-4 py-2 rounded-lg bg-gradient-to-r from-amber-500 to-orange-600 text-white font-semibold text-sm hover:shadow-lg transition-all flex items-center gap-2"
                >
                  <Crown />
                  Upgrade
                </button>
              </div>
            </div>
          </nav>

          {/* Usage Counter */}
          <div className="fixed top-20 right-6 z-40 bg-slate-900/90 backdrop-blur-sm border border-slate-800 rounded-lg px-4 py-2 shadow-lg">
            <div className="text-xs text-slate-400">Usage Today</div>
            <div className="flex items-center gap-2 mt-1">
              <div className="flex gap-1">
                {[...Array(FREE_LIMIT)].map((_, i) => (
                  <div
                    key={i}
                    className={`w-2 h-2 rounded-full transition-all ${
                      i < usageCount ? 'bg-amber-500' : 'bg-slate-700'
                    }`}
                  />
                ))}
              </div>
              <span className="text-sm font-semibold text-white">
                {usageCount}/{FREE_LIMIT}
              </span>
            </div>
          </div>

          {/* Main Content */}
          <main className="pt-24 pb-12 px-6">
            {currentPage === 'home' ? (
              <HomePage setCurrentPage={setCurrentPage} />
            ) : (
              <ToolPage
                tool={TOOLS.find(t => t.id === currentPage)}
                usageCount={usageCount}
                setUsageCount={setUsageCount}
                freeLimit={FREE_LIMIT}
                setShowUpgrade={setShowUpgrade}
              />
            )}
          </main>

          {showUpgrade && <UpgradeModal onClose={() => setShowUpgrade(false)} />}
        </div>
      );
    }

    // Homepage Component  
    function HomePage({ setCurrentPage }) {
      return (
        <div className="max-w-7xl mx-auto">
          {/* Hero */}
          <div className="text-center mb-20 animate-in">
            <h1 className="text-6xl md:text-7xl font-bold mb-6 leading-tight">
              <span className="bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                Land Your Dream Job
              </span>
              <br />
              <span className="bg-gradient-to-r from-amber-400 via-orange-300 to-amber-500 bg-clip-text text-transparent">
                10x Faster
              </span>
            </h1>
            <p className="text-xl text-slate-400 max-w-2xl mx-auto mb-8">
              Professional AI tools to build resumes, craft cover letters, optimize LinkedIn, and ace interviews.
            </p>
            <button
              onClick={() => setCurrentPage('resume')}
              className="px-8 py-4 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-semibold hover:shadow-2xl transition-all transform hover:scale-105 inline-flex items-center gap-2"
            >
              Start Building Free
              <ChevronRight />
            </button>
          </div>

          {/* Tools Grid */}
          <div className="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto">
            {TOOLS.map((tool) => {
              const Icon = tool.icon;
              return (
                <div
                  key={tool.id}
                  onClick={() => setCurrentPage(tool.id)}
                  className="group relative p-8 rounded-2xl bg-gradient-to-br from-slate-900 to-slate-800/50 border border-slate-700/50 hover:border-slate-600 transition-all cursor-pointer hover:shadow-2xl animate-in"
                >
                  <div className={`w-14 h-14 rounded-xl bg-gradient-to-br ${tool.color} flex items-center justify-center mb-4 shadow-lg group-hover:scale-110 transition-all`}>
                    <Icon />
                  </div>
                  <h3 className="text-2xl font-bold mb-2 group-hover:text-amber-400 transition-colors">
                    {tool.name}
                  </h3>
                  <p className="text-slate-400 mb-4">{tool.description}</p>
                  <div className="flex items-center gap-2 text-amber-400 font-medium text-sm">
                    Try it now
                    <ChevronRight />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // Tool Page Component
    function ToolPage({ tool, usageCount, setUsageCount, freeLimit, setShowUpgrade }) {
      const [formData, setFormData] = useState({});
      const [result, setResult] = useState('');
      const [loading, setLoading] = useState(false);
      const Icon = tool.icon;

      const handleGenerate = async () => {
        if (usageCount >= freeLimit) {
          setShowUpgrade(true);
          return;
        }

        setLoading(true);
        
        // DEMO MODE - Replace with your API call
        setTimeout(() => {
          setResult(`Demo Result for ${tool.name}\n\nThis is a demo. To enable AI generation:\n1. Deploy to Vercel\n2. Add ANTHROPIC_API_KEY in environment variables\n3. The API will generate real content!`);
          setUsageCount(prev => prev + 1);
          setLoading(false);
        }, 2000);
      };

      return (
        <div className="max-w-5xl mx-auto animate-in">
          <div className="mb-12">
            <div className={`w-16 h-16 rounded-2xl bg-gradient-to-br ${tool.color} flex items-center justify-center mb-4 shadow-xl`}>
              <Icon />
            </div>
            <h1 className="text-5xl font-bold mb-4">{tool.name}</h1>
            <p className="text-xl text-slate-400">{tool.description}</p>
          </div>

          <div className="grid lg:grid-cols-2 gap-8">
            {/* Input Form */}
            <div className="p-8 rounded-2xl bg-slate-900/50 border border-slate-800">
              <h2 className="text-2xl font-semibold mb-6 flex items-center gap-2">
                <Sparkles />
                Your Information
              </h2>
              
              <div className="space-y-4 mb-6">
                <input
                  type="text"
                  placeholder="Your Name"
                  className="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                  onChange={(e) => setFormData({...formData, name: e.target.value})}
                />
                <textarea
                  placeholder="Tell us about yourself..."
                  rows="4"
                  className="w-full px-4 py-3 rounded-lg bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50"
                  onChange={(e) => setFormData({...formData, details: e.target.value})}
                />
              </div>

              <button
                onClick={handleGenerate}
                disabled={loading || usageCount >= freeLimit}
                className={`w-full px-6 py-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 ${
                  loading || usageCount >= freeLimit
                    ? 'bg-slate-700 text-slate-400 cursor-not-allowed'
                    : 'bg-gradient-to-r from-amber-500 to-orange-600 text-white hover:shadow-2xl transform hover:scale-105'
                }`}
              >
                {loading ? (
                  <>
                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                    Generating...
                  </>
                ) : usageCount >= freeLimit ? (
                  <>
                    <Crown />
                    Upgrade to Continue
                  </>
                ) : (
                  <>
                    <Sparkles />
                    Generate with AI
                  </>
                )}
              </button>
            </div>

            {/* Output */}
            <div className="p-8 rounded-2xl bg-slate-900/50 border border-slate-800 min-h-96">
              <h2 className="text-2xl font-semibold mb-6">Generated Result</h2>
              {result ? (
                <div className="prose prose-invert max-w-none">
                  <pre className="whitespace-pre-wrap text-slate-300 text-sm leading-relaxed font-sans">
                    {result}
                  </pre>
                </div>
              ) : (
                <div className="flex items-center justify-center h-64 text-slate-500">
                  <div className="text-center">
                    <Icon />
                    <p className="mt-4">Your generated content will appear here</p>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Upgrade Modal Component
    function UpgradeModal({ onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
          <div className="relative max-w-2xl w-full bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl border border-slate-700 p-8 shadow-2xl">
            <button
              onClick={onClose}
              className="absolute top-6 right-6 p-2 text-slate-400 hover:text-white transition-colors"
            >
              <X />
            </button>

            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center mx-auto mb-4 shadow-xl">
                <Crown />
              </div>
              <h2 className="text-4xl font-bold mb-3">Upgrade to Pro</h2>
              <p className="text-slate-400 text-lg">Unlock unlimited access to all AI tools</p>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              <div className="p-6 rounded-xl bg-slate-800/50 border border-slate-700">
                <h3 className="text-xl font-semibold mb-2">Free</h3>
                <div className="text-3xl font-bold mb-4">$0<span className="text-lg text-slate-400">/month</span></div>
                <ul className="space-y-3">
                  {['3 uses per day', 'All 4 tools', 'Basic templates'].map(feature => (
                    <li key={feature} className="flex items-center gap-2 text-slate-400">
                      <Check />
                      {feature}
                    </li>
                  ))}
                </ul>
              </div>

              <div className="p-6 rounded-xl bg-gradient-to-br from-amber-500/20 to-orange-600/20 border-2 border-amber-500/50">
                <h3 className="text-xl font-semibold mb-2">Pro</h3>
                <div className="text-3xl font-bold mb-4">$12<span className="text-lg text-slate-400">/month</span></div>
                <ul className="space-y-3 mb-6">
                  {['Unlimited uses', 'All tools', 'Premium templates', 'Priority support'].map(feature => (
                    <li key={feature} className="flex items-center gap-2 text-white">
                      <Check className="text-amber-400" />
                      {feature}
                    </li>
                  ))}
                </ul>
                <button className="w-full px-6 py-3 rounded-lg bg-gradient-to-r from-amber-500 to-orange-600 text-white font-semibold hover:shadow-xl transition-all">
                  Upgrade Now
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render App
    ReactDOM.render(<CareerBoostAI />, document.getElementById('root'));
  </script>
</body>
</html>
